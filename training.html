// ═══ TIMER ═══
let timerInterval = null;
let timerSeconds = 0;

function startTimer(seconds, exerciseName) {
  timerSeconds = seconds;
  const display = document.getElementById('timerDisplay');
  const overlay = document.getElementById('timerOverlay');
  const exName = document.getElementById('timerExercise');

  display.textContent = seconds;
  display.classList.remove('go');
  exName.textContent = exerciseName || '';
  overlay.classList.add('active');

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      display.textContent = 'GO';
      display.classList.add('go');
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
    } else {
      display.textContent = timerSeconds;
    }
  }, 1000);
}

function cancelTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerOverlay').classList.remove('active');
}

function dismissTimer(e) {
  if (e.target === document.getElementById('timerOverlay')) cancelTimer();
}

// ═══ TOAST ═══
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══ MENU ═══
function toggleMenu() {
  document.getElementById('chapterMenu').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
}

// ═══ WARMUP TOGGLE ═══
function toggleWarmup() {
  const btn = document.getElementById('warmupToggle');
  const content = document.getElementById('warmupContent');
  btn.classList.toggle('open');
  content.classList.toggle('show');
  btn.querySelector('span:first-child').textContent =
    content.classList.contains('show') ? '▾ Warm-up' : '▸ Warm-up';
}
document.getElementById('warmupToggle')?.addEventListener('click', toggleWarmup);

// ═══ FORMAT REST TIME ═══
function fmtRest(s) {
  if (s >= 60) return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  return s + 's';
}

    html += '</div>';

  // Stretches
  if (program.stretches && program.stretches.length) {
    html += '<div class="section-rule" data-phase="stretch"><span>STRETCHES</span></div>';
    program.stretches.forEach(ex => {
      html += '<div class="warmup-item"><span>' + ex.name + '</span><span class="data-sm ghost">' + (ex.duration || '') + '</span></div>';
    });
  }

  // Cardio
  if (program.cardio && program.cardio.length) {
    html += '<div class="section-rule" data-phase="cardio"><span>CARDIO</span></div>';
    program.cardio.forEach(ex => {
      html += '<div class="entry"><div class="entry-name">' + ex.name + '</div>';
      html += '<div class="entry-machine">' + (ex.duration || '') + '</div>';
      if (ex.video) html += '<div class="entry-actions"><a href="' + ex.video + '" target="_blank">Form</a></div>';
      html += '</div>';
    });
  }

  entries.innerHTML = html;

  // Quote
  const q = QUOTES[today] || QUOTES.monday;
  quote.innerHTML = '<p class="quote-text">"' + q + '"</p><p class="quote-attr">— RAYLEIGH</p>';

  // Load baselines
  loadBaselines();
}

// ═══ LOG TO SIGNAL ═══
function logExercise(name) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(name).then(() => {
      showToast('Copied: ' + name);
      setTimeout(() => window.open(SIGNAL_URL, '_blank'), 300);
    });
  } else {
    window.open(SIGNAL_URL, '_blank');
  }
}

// ═══ BASELINES ═══
async function loadBaselines() {
  try {
    const resp = await fetch('https://cobydata2026.blob.core.windows.net/dashboard/baselines.json?' + Date.now());
    const data = await resp.json();
    const dayData = data[today];
    if (!dayData || !dayData.exercises) return;

    const program = PROGRAMS[today];
    if (!program) return;

    program.main.forEach((ex, i) => {
      const bl = dayData.exercises[ex.name];
      if (bl && bl.topSet) {
        const el = document.getElementById('bl-' + i);
        if (el) {
          el.textContent = bl.topSet;
          if (bl.note) el.textContent += ' · ' + bl.note;
          el.style.display = 'block';
        }
      }
    });
  } catch (e) {
    // Baselines are optional
  }
}

// ═══ SESSION POLLING ═══
async function pollSession() {
  try {
    const resp = await fetch('https://cobydata2026.blob.core.windows.net/dashboard/session-state.json?' + Date.now());
    const session = await resp.json();
    if (session.status !== 'active' && session.status !== 'completed') {
      document.getElementById('sessionBar').classList.add('hidden');
      return;
    }
    if (session.day !== today) return;

    const bar = document.getElementById('sessionBar');
    const fill = document.getElementById('sessionFill');
    const stats = document.getElementById('sessionStats');

    bar.classList.remove('hidden');
    const pct = session.stats ? Math.round((session.stats.setsCompleted / session.stats.setsTotal) * 100) : 0;
    fill.style.width = pct + '%';
    if (session.stats) {
      stats.textContent = session.stats.setsCompleted + '/' + session.stats.setsTotal + ' sets · ' + (session.stats.elapsedMinutes || 0) + ' min';
    }

    // Mark done exercises
    if (session.exercises) {
      const entries = document.querySelectorAll('.entry');
      session.exercises.forEach(se => {
        if (se.status === 'done' && se.phase === 'main') {
          // Find matching entry by name
          entries.forEach(entry => {
            const nameEl = entry.querySelector('.entry-name');
            if (nameEl && nameEl.textContent === se.name) {
              entry.classList.add('is-done');
            }
          });
        }
      });
    }
  } catch (e) {
    // Session polling is optional
  }
}

// ═══ INIT ═══
render();
setInterval(pollSession, 15000);
pollSession();
</script>

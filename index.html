<script>
const DAYS_MAP = {
  monday: 'Push Day', tuesday: 'Pull Day', wednesday: 'Leg Day',
  thursday: 'Core + Functional', friday: 'Upper Day', saturday: 'Lower Day', sunday: 'Rest Day'
};
const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

const timeOfDay = hour < 12 ? 'Morning' : hour < 17 ? 'Afternoon' : 'Evening';
document.getElementById('greetingText').textContent = timeOfDay + ', Luffy.';

const dayStart = new Date(2026, 2, 29);
const dayCount = Math.floor((new Date() - dayStart) / 86400000);
const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
document.getElementById('greetingSub').textContent = 'Day ' + dayCount + ' of the voyage.';

// Today's training
document.getElementById('ch-training').textContent = DAYS_MAP[today] || 'Rest';
